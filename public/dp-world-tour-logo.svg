<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="DP World Tour">
  <defs>
    <linearGradient id="dpwRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ef1e4e"/>
      <stop offset="1" stop-color="#8e1230"/>
    </linearGradient>
    <linearGradient id="dpwGreen" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#2f9d3a"/>
      <stop offset="1" stop-color="#4bb648"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="120" height="120" rx="14" fill="#3a1a5f"/>

  <!-- globe emblem -->
  <g>
    <!-- green sweeping band -->
    <path d="M26,58 C38,49 50,50 60,50 C74,50 84,42 95,29 C93,40 85,48 73,52 C58,57 40,58 30,63 C28,61 26,60 26,58 Z" fill="url(#dpwGreen)"/>
    <!-- red crescent -->
    <path d="M50,43 C48,28 57,16 71,17 C80,18 86,25 88,33 C82,27 74,25 67,28 C59,31 54,37 51,45 C50,45 50,44 50,43 Z" fill="url(#dpwRed)"/>
    <!-- white crescent -->
    <path d="M40,55 C50,69 67,71 82,60 C79,72 66,79 53,76 C45,74 40,65 40,55 Z" fill="#ffffff"/>
  </g>

  <!-- wordmark -->
  <text x="60" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="17" letter-spacing="0.5" fill="#ffffff">DP WORLD</text>
  <text x="60" y="110" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="21" letter-spacing="0.5" fill="#ffffff">TOUR</text>
</svg>
